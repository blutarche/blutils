<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    blutils favicon — the `b.` brand mark inside an accent-purple
    rounded square. The dot is a circle (not a text glyph) so it
    renders predictably at 16 px; the `b` uses the OS monospace
    stack so we don't need to fetch JetBrains Mono just to draw
    a favicon.
  -->
  <rect width="32" height="32" rx="6" fill="#9084EB"/>
  <text
    x="9"
    y="24"
    font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
    font-size="22"
    font-weight="700"
    fill="#0F0F11"
  >b</text>
  <circle cx="24" cy="22" r="2.4" fill="#0F0F11"/>
</svg>
